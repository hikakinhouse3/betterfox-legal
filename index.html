:root{color-scheme:dark;--bg:#16101F;--panel:#200E78;--fg:#E8E4FB;--fg-dim:#AFA9EC;--accent:#D85A30;--border:rgba(175,169,236,.25)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;line-height:1.8;-webkit-font-smoothing:antialiased}

.links a:hover{background:rgba(32,14,120,.7)}
.links a span.arrow{color:var(--fg-dim)}
footer{text-align:center;margin-top:56px;color:var(--fg-dim);font-size:13px;line-height:1.9}
